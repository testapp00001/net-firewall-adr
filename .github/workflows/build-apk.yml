name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*' # Triggers when you push a version tag like v1.0, v1.1, etc.
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Create fallback .env file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "GEMINI_API_KEY=dummy_value" > .env
          fi

      - name: Configure Keystores
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          # 1. Restore the debug keystore from base64 if it exists, or generate a new fallback debug keystore automatically
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug keystore from repository base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ -f debug.keystore ]; then
            echo "debug.keystore already exists."
          else
            echo "No debug.keystore or debug.keystore.base64 found. Auto-generating fallback debug.keystore using keytool..."
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          # 2. Setup release keystore only if custom secrets exist to secure your distribution builds
          if [ ! -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Custom release keystore secrets found. Decoding..."
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > my-upload-key.jks
          else
            echo "No custom release keystore secret found. Will use a mock upload keystore with alias 'upload' for release compilation."
            if [ -f my-upload-key.jks ]; then
              echo "my-upload-key.jks already exists."
            else
              keytool -genkeypair -v \
                -keystore my-upload-key.jks \
                -alias upload \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -storepass android \
                -keypass android \
                -dname "CN=Android Upload,O=Android,C=US"
            fi
          fi

      - name: Grant Execute Permission to Gradlew
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          fi

      # --- STEP 1: DEVELOPMENT COMPILATION (Runs on regular branches / Pull Requests) ---
      - name: Build Standard Development APKs
        if: "!startsWith(github.ref, 'refs/tags/v')"
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'android' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'upload' }}
        run: |
          echo "Building verification and debug targets..."
          gradle compileDebugSources assembleDebug assembleRelease --no-daemon

      # --- STEP 2: PRODUCTION v1.0 RELEASE COMPILATION (Runs ONLY when pushing a version tag) ---
      - name: Build Official Production Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ] || [ -z "$KEY_ALIAS" ]; then
            echo "CRITICAL ERROR: Production build secrets (STORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS) are missing!"
            echo "Please configure your GitHub Repository Secrets before cutting a v1.0 release."
            exit 1
          fi
          echo "Building optimized and signed Production Release APK..."
          gradle compileDebugSources assembleRelease --no-daemon

      - name: Locate and Rename Artifacts
        run: |
          mkdir -p build-artifacts
          
          # Copy Debug APK if generated
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/net-firewall-debug.apk
          fi
          
          # Copy Release APK with dynamic version tagging if it's an official release tag
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
              TAG_NAME=${GITHUB_REF#refs/tags/}
              cp app/build/outputs/apk/release/app-release.apk build-artifacts/net-firewall-release-${TAG_NAME}.apk
            else
              cp app/build/outputs/apk/release/app-release.apk build-artifacts/net-firewall-release.apk
            fi
          fi

      - name: Upload APKs as Workflow Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: NetFirewall-APKs
          path: build-artifacts/
          retention-days: 14