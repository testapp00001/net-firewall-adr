name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Create fallback .env file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "GEMINI_API_KEY=dummy_value" > .env
          fi

      - name: Configure Keystores
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # 1. Restore the debug keystore from base64 if it exists, or generate a new fallback debug keystore automatically
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug keystore from repository base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ -f debug.keystore ]; then
            echo "debug.keystore already exists."
          else
            echo "No debug.keystore or debug.keystore.base64 found. Auto-generating fallback debug.keystore using keytool..."
            keytool -genkeypair -v \
              -keystore debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          # 2. Setup release keystore only if custom secrets exist to secure your distribution builds
          if [ ! -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Custom release keystore secrets found. Decoding..."
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > my-upload-key.jks
          else
            echo "No custom release keystore secret found. Will use a mock upload keystore with alias 'upload' for release compilation."
            if [ -f my-upload-key.jks ]; then
              echo "my-upload-key.jks already exists."
            else
              keytool -genkeypair -v \
                -keystore my-upload-key.jks \
                -alias upload \
                -keyalg RSA \
                -keysize 2048 \
                -validity 10000 \
                -storepass android \
                -keypass android \
                -dname "CN=Android Upload,O=Android,C=US"
            fi
          fi

      - name: Grant Execute Permission to Gradlew
        # Check if gradlew exists, grant permission, or just use system-wide gradle tasks
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          fi

      - name: Run Applet Compile (Verification)
        # Verify package compiles cleanly beforehand
        run: gradle compileDebugSources --no-daemon

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # Build a release build. If the user hasn't setup release secrets, it will build with the fallback key.
          if [ ! -z "$STORE_PASSWORD" ] && [ ! -z "$KEY_PASSWORD" ]; then
            echo "Building fully signed Production Release APK..."
            gradle assembleRelease --no-daemon
          else
            echo "Building unsigned/placeholder-signed Release APK..."
            # Setup fallback passwords so compile doesn't break due to missing env variables
            export STORE_PASSWORD="android"
            export KEY_PASSWORD="android"
            gradle assembleRelease --no-daemon
          fi

      - name: Locate and Rename Artifacts
        run: |
          mkdir -p build-artifacts
          
          # Copy Debug APK
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/net-firewall-debug.apk
          fi
          
          # Copy Release APK
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk build-artifacts/net-firewall-release.apk
          fi

      - name: Upload APKs as Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetFirewall-APKs
          path: build-artifacts/
          retention-days: 14
